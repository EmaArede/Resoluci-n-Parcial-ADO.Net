version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: dron_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: dron_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Scripts:/docker-entrypoint-initdb.d

volumes:
  postgres_data: